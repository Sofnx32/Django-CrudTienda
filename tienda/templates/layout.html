{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="{% url 'index' %}">🛒 Tienda Tecsup</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'index' %}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'producto' %}">Productos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'ver_carrito' %}">
            🛒 Carrito
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-4">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    Categorías
                </div>

                <ul class="list-group list-group-flush">
                    {% for c in categorias %}
                    <li class="list-group-item d-flex align-items-center">

                        {% if c.imagen %}
                            <img src="{{ c.imagen.url }}" width="40" height="40" class="me-2 rounded">
                        {% else %}
                            <img src="https://via.placeholder.com/40" class="me-2 rounded">
                        {% endif %}

                        <a href="{% url 'productos_por_categoria' c.id %}" 
                           class="text-decoration-none fw-semibold">
                            {{ c.nombre }}
                        </a>

                    </li>
                    {% empty %}
                    <li class="list-group-item text-center">
                        No hay categorías
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <!-- CONTENIDO DINÁMICO -->
        <div class="col-md-9">
            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-4">
    <p class="mb-0">© 2026 Tienda Tecsup</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
